# ---------------------------------------------------------------------------
# Unified External Aerodynamics - Surface Training Configuration (DoMINO)
# ---------------------------------------------------------------------------
#
# >>> DRAFT: this config does NOT run end-to-end yet.
#
# The dataset YAML (drivaer_ml_surface.yaml) does not yet expose all the
# per-cell neighbor / grid features that DoMINO's `forward()` consumes.
# The `forward_kwargs:` block below is illustrative; running this config
# requires extending the dataset pipeline with a DoMINO-specific
# pre-processing stage (and is excluded from the synthetic E2E test
# suite for that reason). See `tests/test_synthetic_configs.py`.
#
# DoMINO uses a geometry-encoding UNet + basis-function architecture that
# natively handles SDF grids and surface neighbor information. Its forward
# method accepts a single ``data_dict`` argument; the recipe's
# ``forward_kwargs:`` resolver builds that dict by recursing into the
# nested-dict spec below (see ``src/forward_kwargs.py``).

output_dir: "runs"
checkpoint_dir: null
run_id: "surface_domino_drivaer_ml"

precision: "bfloat16"
compile: false            # DoMINO internals are not compile-friendly yet
profile: false
augment: false
benchmark_io: false

# -- Data contract -----------------------------------------------------------
# DoMINO's forward signature is `forward(self, data_dict)`; the nested-dict
# spec below resolves to `model.forward(data_dict={...})` automatically.
#
# NOTE: DoMINO is still in progress in this recipe. The dataset YAML
# (drivaer_ml_surface.yaml) does not yet expose all the per-cell neighbor /
# grid features that DoMINO's full `forward(data_dict)` expects. The
# references below are illustrative; running this config end-to-end
# requires extending the dataset pipeline with a DoMINO-specific
# pre-processing stage.
input_type: tensors
output_type: tensors

forward_kwargs:
  data_dict:
    geometry_coordinates: interior.points
    surface_mesh_centers: interior.points
    surface_normals: boundaries.vehicle.cell_data.normals
    global_params_values: global_data.U_inf
    global_params_reference: global_data.U_inf

# -- Model (DoMINO, surface-only) -------------------------------------------
model:
  _target_: physicsnemo.models.domino.DoMINO
  input_features: 3         # x, y, z coordinates
  output_features_vol: null  # surface-only mode
  output_features_surf: 4   # pressure (1) + wss (3)
  global_features: 3        # freestream velocity U_inf (3 components)
  model_parameters:
    interp_res: [128, 64, 64]
    use_sdf_in_basis_func: true
    surface_neighbors: true
    num_neighbors_surface: 7
    use_surface_normals: true
    use_surface_area: true
    geometry_encoding_type: "both"

# -- Dataset -----------------------------------------------------------------
dataset:
  name: drivaer_ml_surface
  sampling_resolution: 200000
  metrics: [l2]

# -- Training ----------------------------------------------------------------
training:
  seed: 42
  num_epochs: 500
  save_interval: 25
  loss_type: "huber"
  batch_size: 1
  scheduler_update_mode: "epoch"

  optimizer:
    lr: 1.0e-3
    weight_decay: 1.0e-4
    betas: [0.9, 0.999]
    eps: 1.0e-8

  scheduler:
    _target_: torch.optim.lr_scheduler.StepLR
    step_size: 100
    gamma: 0.5

# -- DataLoader / Dataset Performance Tuning --------------------------------
dataloader:
  prefetch_factor: 1
  num_streams: 1
  use_streams: false       # SDF computation is not stream-safe
  num_workers: 1
  pin_memory: true

# -- Logging -----------------------------------------------------------------
logging:
  log_every_n_steps: 10

# -- Data paths --------------------------------------------------------------
# Splits are read from manifest.json; change train_split / val_split to
# switch experiments.
data:
  drivaer_ml:
    config: conf/dataset/drivaer_ml_surface.yaml
    train_split: train
    val_split: val

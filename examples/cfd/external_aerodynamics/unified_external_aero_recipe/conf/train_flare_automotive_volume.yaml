# ---------------------------------------------------------------------------
# Unified External Aerodynamics - Volume Training Configuration (FLARE)
# ---------------------------------------------------------------------------
# Trains a FLARE model (Transolver with FLARE attention) on volume fields
# (velocity, pressure, nut) from DrivaerML volume meshes.

output_dir: "runs"
checkpoint_dir: null
run_id: "volume_flare_drivaer_ml"

precision: "bfloat16"
compile: true
profile: false
augment: false
benchmark_io: false

# -- Data contract -----------------------------------------------------------
input_type: tensors
output_type: tensors

forward_kwargs:
  embedding:
    - interior.points
    - interior.point_data.sdf
    - interior.point_data.sdf_normals
  fx:
    source: global_data.U_inf
    expand_like: embedding

# -- Model (FLARE) -----------------------------------------------------------
# FLARE inherits from Transolver and replaces physics attention blocks with
# FLARE (Fast Low-rank Attention Routing Engine) blocks.  TE is not supported.
model:
  _target_: physicsnemo.experimental.models.flare.FLARE
  functional_dim: 3       # fx = freestream velocity U_inf (3)
  out_dim: 5              # velocity (3) + pressure (1) + nut (1)
  embedding_dim: 7        # embedding = points (3) + sdf (1) + sdf_normals (3)
  n_layers: 12
  n_hidden: 256
  dropout: 0.0
  n_head: 8
  act: "gelu"
  mlp_ratio: 4
  slice_num: 256          # n_global_queries for FLARE attention
  unified_pos: false
  structured_shape: null  # unstructured mesh

# -- Dataset -----------------------------------------------------------------
dataset:
  name: drivaer_ml_volume
  sampling_resolution: 200000
  metrics: [l2]

# -- Training ----------------------------------------------------------------
training:
  seed: 42              # set to null to leave RNGs unseeded
  num_epochs: 500
  save_interval: 25
  loss_type: "huber"
  batch_size: 1
  scheduler_update_mode: "epoch"

  optimizer:
    lr: 1.0e-3
    weight_decay: 1.0e-4
    betas: [0.9, 0.999]
    eps: 1.0e-8

  scheduler:
    _target_: torch.optim.lr_scheduler.StepLR
    step_size: 100
    gamma: 0.5

# -- DataLoader / Dataset Performance Tuning --------------------------------
dataloader:
  prefetch_factor: 1
  num_streams: 1
  use_streams: false       # SDF computation is not stream-safe
  num_workers: 1
  pin_memory: true

# -- Logging -----------------------------------------------------------------
logging:
  log_every_n_steps: 10

# -- Data paths --------------------------------------------------------------
# Splits are read from manifest.json; change train_split / val_split to
# switch experiments.
data:
  drivaer_ml:
    config: conf/dataset/drivaer_ml_volume.yaml
    train_split: train
    val_split: val

# ---------------------------------------------------------------------------
# Unified External Aerodynamics - Surface Training Configuration
# ---------------------------------------------------------------------------
# Trains a GeoTransolver model on surface pressure (Cp) and wall shear
# stress (Cf) from DrivaerML (point cloud) and/or SHIFT SUV (triangulated).

output_dir: "runs"
checkpoint_dir: null
run_id: "surface_geotransolver_shift_suv_estate"

precision: "bfloat16"
compile: false
profile: false
augment: false
benchmark_io: false

# -- Data contract -----------------------------------------------------------
# This model consumes batched flat tensors (B=1) and emits a (1, N, C) output
# tensor with channels concatenated in the dataset YAML's `targets:` order.
input_type: tensors
output_type: tensors

# Maps DomainMesh paths to GeoTransolver.forward kwargs. The dataset YAML
# (drivaer_ml_surface.yaml) produces a DomainMesh whose `interior` is a
# Mesh[0, 3] point cloud at the (subsampled) surface cell centroids and
# whose `boundaries.vehicle` is the original triangulated surface with
# precomputed cell normals.
forward_kwargs:
  geometry: interior.points
  local_embedding:
    - interior.points
    - boundaries.vehicle.cell_data.normals
  local_positions: interior.points
  global_embedding: global_data.U_inf

# -- Model (GeoTransolver) --------------------------------------------------
model:
  _target_: physicsnemo.experimental.models.geotransolver.GeoTransolver
  functional_dim: 6       # local_embedding = geometry coords (3) + normals (3)
  out_dim: 4              # pressure (1) + wss (3)
  geometry_dim: 3         # point coordinates
  global_dim: 3           # inlet velocity (3)
  n_layers: 12
  n_hidden: 256
  dropout: 0.0
  n_head: 8
  act: "gelu"
  mlp_ratio: 4
  slice_num: 256
  use_te: false
  plus: false
  include_local_features: false
  radii: [0.1, 0.5, 2.0]
  neighbors_in_radius: [16, 32, 64]
  n_hidden_local: 32
  state_mixing_mode: "weighted"  # "weighted" (default) or "concat_project"

# -- Dataset -----------------------------------------------------------------
dataset:
  name: drivaer_ml_surface
  sampling_resolution: 200000   # override SubsampleMesh n_cells/n_points in all dataset configs
  metrics: [l2]                 # subset of dataset YAML's `metrics:` list

# -- Training ----------------------------------------------------------------
training:
  seed: 42              # set to null to leave RNGs unseeded
  num_epochs: 500
  save_interval: 25
  loss_type: "huber"
  batch_size: 1
  scheduler_update_mode: "epoch"

  optimizer:
    lr: 3.0e-3
    weight_decay: 1.0e-4
    betas: [0.9, 0.999]
    eps: 1.0e-8

  scheduler:
    _target_: torch.optim.lr_scheduler.StepLR
    step_size: 100
    gamma: 0.1

# -- DataLoader / Dataset Performance Tuning --------------------------------
dataloader:
  prefetch_factor: 1
  num_streams: 1
  use_streams: false      # ball query is not stream-safe
  num_workers: 1
  pin_memory: true

# -- Logging -----------------------------------------------------------------
logging:
  log_every_n_steps: 10

# -- Data paths --------------------------------------------------------------
# Splits are read from manifest.json; change train_split / val_split to
# switch experiments.
data:
  drivaer_ml:
    config: conf/dataset/drivaer_ml_surface.yaml
    train_split: train
    val_split: val

# ---------------------------------------------------------------------------
# Unified External Aerodynamics - Volume Training Configuration
#   (GeoTransolver with FLARE Attention / GALE_FA)
# ---------------------------------------------------------------------------
# Trains a GeoTransolver model using the GALE_FA attention backbone (FLARE-
# based self-attention + GALE cross-attention) on volume fields (velocity,
# pressure, nut) from DrivaerML volume meshes.

output_dir: "runs"
checkpoint_dir: null
run_id: "volume_geotransolver_fa_drivaer_ml"

precision: "bfloat16"
compile: true
profile: false
augment: false
benchmark_io: false

# -- Data contract -----------------------------------------------------------
input_type: tensors
output_type: tensors

forward_kwargs:
  geometry: interior.points
  local_embedding:
    - interior.points
    - interior.point_data.sdf
    - interior.point_data.sdf_normals
  local_positions: interior.points
  global_embedding: global_data.U_inf

# -- Model (GeoTransolver + GALE_FA) ----------------------------------------
# Uses GALE_FA attention (FLARE self-attention with GALE cross-attention)
# instead of the default GALE physics attention.  GALE_FA does not support
# Transformer Engine — use_te must be false.
model:
  _target_: physicsnemo.experimental.models.geotransolver.GeoTransolver
  functional_dim: 7       # local_embedding = geometry coords (3) + sdf (1) + sdf_normals (3)
  out_dim: 5              # velocity (3) + pressure (1) + nut (1)
  geometry_dim: 3         # point coordinates
  global_dim: 3           # inlet velocity (3)
  n_layers: 20
  n_hidden: 256
  dropout: 0.0
  n_head: 8
  act: "gelu"
  mlp_ratio: 4
  slice_num: 256
  use_te: false           # GALE_FA does not support TE
  plus: false
  attention_type: "GALE_FA"
  include_local_features: true
  radii: [0.01, 0.05, 0.25, 1.0, 2.5, 5.0]
  neighbors_in_radius: [8, 16, 32, 32, 64, 128]
  n_hidden_local: 32
  state_mixing_mode: "concat_project"  # "weighted" (default) or "concat_project"

# -- Dataset -----------------------------------------------------------------
dataset:
  name: drivaer_ml_volume
  sampling_resolution: 100000
  metrics: [l2, l1]

# -- Training ----------------------------------------------------------------
training:
  seed: 42              # set to null to leave RNGs unseeded
  num_epochs: 500
  save_interval: 25
  loss_type: "huber"
  batch_size: 1
  scheduler_update_mode: "epoch"

  optimizer:
    lr: 3.0e-3
    weight_decay: 1.0e-4
    betas: [0.9, 0.999]
    eps: 1.0e-8

  scheduler:
    _target_: torch.optim.lr_scheduler.StepLR
    step_size: 50
    gamma: 0.05

# -- DataLoader / Dataset Performance Tuning --------------------------------
dataloader:
  prefetch_factor: 1
  num_streams: 1
  use_streams: false       # SDF computation is not stream-safe
  num_workers: 1
  pin_memory: false

# -- Logging -----------------------------------------------------------------
logging:
  log_every_n_steps: 10

# -- Data paths --------------------------------------------------------------
# Splits are read from manifest.json; change train_split / val_split to
# switch experiments.
data:
  drivaer_ml:
    config: conf/dataset/drivaer_ml_volume.yaml
    train_split: train
    val_split: val
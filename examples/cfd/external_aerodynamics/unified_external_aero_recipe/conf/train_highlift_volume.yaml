# ---------------------------------------------------------------------------
# High-Lift Airplane - Volume Training Configuration (Compressible)
# ---------------------------------------------------------------------------
# Trains a GeoTransolver model on volume pressure, temperature, density,
# and velocity from the HiLiftAeroML dataset (AoA 4°).
# Volume data is a point cloud — no surface normals available.

output_dir: "runs"
checkpoint_dir: null
run_id: "highlift_volume_geotransolver"

precision: "bfloat16"
compile: false
profile: false
augment: false
benchmark_io: false

# -- Data contract -----------------------------------------------------------
input_type: tensors
output_type: tensors

forward_kwargs:
  geometry: interior.points
  local_embedding:
    - interior.points
    - interior.point_data.sdf
    - interior.point_data.sdf_normals
  local_positions: interior.points
  global_embedding: global_data.U_inf

# -- Model (GeoTransolver) --------------------------------------------------
model:
  _target_: physicsnemo.experimental.models.geotransolver.GeoTransolver
  functional_dim: 7       # local_embedding = coords (3) + SDF (1) + SDF normals (3)
  out_dim: 6              # pressure (1) + temperature (1) + density (1) + velocity (3)
  geometry_dim: 3         # point coordinates
  global_dim: 3           # freestream velocity U_inf (3)
  n_layers: 12
  n_hidden: 256
  dropout: 0.0
  n_head: 8
  act: "gelu"
  mlp_ratio: 4
  slice_num: 256
  use_te: false
  plus: false
  include_local_features: false
  radii: [0.1, 0.5, 2.0]
  neighbors_in_radius: [16, 32, 64]
  n_hidden_local: 32

# -- Dataset -----------------------------------------------------------------
dataset:
  name: highlift_volume
  sampling_resolution: 100000
  metrics: [l2]

# -- Training ----------------------------------------------------------------
training:
  seed: 42
  num_epochs: 200
  save_interval: 25
  loss_type: "huber"
  batch_size: 1
  scheduler_update_mode: "epoch"

  optimizer:
    lr: 3.0e-3
    weight_decay: 1.0e-4
    betas: [0.9, 0.999]
    eps: 1.0e-8

  scheduler:
    _target_: torch.optim.lr_scheduler.StepLR
    step_size: 100
    gamma: 0.1

# -- DataLoader / Dataset Performance Tuning --------------------------------
dataloader:
  prefetch_factor: 1
  num_streams: 1
  use_streams: false       # SDF computation is not stream-safe
  num_workers: 1
  pin_memory: true

# -- Logging -----------------------------------------------------------------
logging:
  log_every_n_steps: 10

# -- Data paths --------------------------------------------------------------
# Splits are read from manifest.json; change train_split / val_split to
# switch experiments.  Available keys in the manifest:
#   single_aoa_{4,12,22}_{train,val,test}   (fully covered by converted AoAs)
#   full_{train,val,test}                   (10 AoAs - needs more conversions)
#   scarce_{train,val,test}
#   super_scarce_{train,val,test}
#   geometry_{train,val,test}
#   aoa_{train,val,test}                    (train 4-12, test 14-22)
#   deflection_{train,val,test}
#   stall_{train,val,test}
data:
  highlift:
    config: conf/dataset/highlift_volume.yaml
    train_split: single_aoa_4_train
    val_split: single_aoa_4_val

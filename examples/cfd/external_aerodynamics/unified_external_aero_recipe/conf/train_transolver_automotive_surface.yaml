# ---------------------------------------------------------------------------
# Unified External Aerodynamics - Surface Training Configuration (Transolver)
# ---------------------------------------------------------------------------
# Trains a Transolver model on surface pressure (Cp) and wall shear
# stress (Cf) from DrivaerML and/or SHIFT SUV datasets.

output_dir: "runs"
checkpoint_dir: null
run_id: "surface_transolver_drivaer_ml"

precision: "bfloat16"
compile: true
profile: false
augment: false
benchmark_io: false

# -- Data contract -----------------------------------------------------------
input_type: tensors
output_type: tensors

# Transolver concats `[embedding, fx]` along the last dim, so `fx` must
# match `embedding`'s spatial dim. The `expand_like` modifier broadcasts
# the freestream `U_inf` (a per-sample vector) across the per-cell axis
# of `embedding`, so `fx` ends up shaped to align with the per-cell
# features in `embedding`.
forward_kwargs:
  embedding:
    - interior.points
    - boundaries.vehicle.cell_data.normals
  fx:
    source: global_data.U_inf
    expand_like: embedding

# -- Model (Transolver) -----------------------------------------------------
model:
  _target_: physicsnemo.models.transolver.Transolver
  functional_dim: 3       # fx = freestream velocity U_inf (3)
  out_dim: 4              # pressure (1) + wss (3)
  embedding_dim: 6        # embedding = points (3) + normals (3)
  n_layers: 8
  n_hidden: 256
  dropout: 0.0
  n_head: 8
  act: "gelu"
  mlp_ratio: 4
  slice_num: 256
  unified_pos: false
  structured_shape: null  # unstructured mesh
  use_te: false
  plus: false

# -- Dataset -----------------------------------------------------------------
dataset:
  name: drivaer_ml_surface
  sampling_resolution: 200000
  metrics: [l2]

# -- Training ----------------------------------------------------------------
training:
  seed: 42              # set to null to leave RNGs unseeded
  num_epochs: 500
  save_interval: 25
  loss_type: "huber"
  batch_size: 1
  scheduler_update_mode: "epoch"

  optimizer:
    lr: 1.0e-3
    weight_decay: 1.0e-4
    betas: [0.9, 0.999]
    eps: 1.0e-8

  scheduler:
    _target_: torch.optim.lr_scheduler.StepLR
    step_size: 100
    gamma: 0.5

# -- DataLoader / Dataset Performance Tuning --------------------------------
dataloader:
  prefetch_factor: 1
  num_streams: 1
  use_streams: false      # ball query is not stream-safe
  num_workers: 1
  pin_memory: true

# -- Logging -----------------------------------------------------------------
logging:
  log_every_n_steps: 10

# -- Data paths --------------------------------------------------------------
# Splits are read from manifest.json; change train_split / val_split to
# switch experiments.
data:
  drivaer_ml:
    config: conf/dataset/drivaer_ml_surface.yaml
    train_split: train
    val_split: val
  shift_suv_estate:
    config: conf/dataset/shift_suv_estate.yaml
  shift_suv_fastback:
    config: conf/dataset/shift_suv_fastback.yaml
